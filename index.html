<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caja Rápida</title>

    <link rel="icon" type="image/png" sizes="192x192" href="icono.png">
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="manifest" href="data:application/manifest+json,{%22icons%22:[{%22src%22:%22icono.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22,%22purpose%22:%22any%20maskable%22}]}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .tabla-scroll { max-height: 250px; overflow-y: auto; }
        .texto-lista { font-size: 1.1rem; }

        /* Aviso de error de red visible para el usuario */
        #aviso-error {
            display: none;
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background: #dc3545;
            color: white;
            padding: .6rem 1.2rem;
            border-radius: 8px;
            font-size: .95rem;
            z-index: 9999;
            box-shadow: 0 2px 8px rgba(0,0,0,.25);
        }
    </style>
</head>
<body class="bg-light">

<div id="aviso-error">⚠️ Sin conexión — reintentando...</div>

<div class="container mt-4" style="max-width: 600px;">
    <h2 class="text-center mb-1">Caja Rápida</h2>
    <p id="fecha-actual" class="text-center text-secondary mb-2 text-capitalize"></p>

    <div class="text-center mb-4">
        <button class="btn btn-sm btn-outline-secondary" onclick="abrirHistorial()">Ver Historial de Cortes 📅</button>
    </div>

    <div id="panel-historial" class="card shadow-sm mb-4 border-secondary" style="display: none;">
        <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Historial de Turnos</h5>
            <button class="btn btn-sm btn-light" onclick="cerrarHistorial()">Cerrar</button>
        </div>
        <div class="card-body">
            <div id="lista-historial" class="list-group mb-3" style="max-height: 200px; overflow-y: auto;"></div>
            <div id="detalle-historial"></div>
        </div>
    </div>

    <div class="card mb-4 shadow-sm" id="panel-apertura">
        <div class="card-body text-center">
            <h5 id="texto-turno" class="text-muted">No hay turno abierto</h5>
            <button id="btn-abrir" class="btn btn-primary btn-lg mt-2" onclick="abrirTurno()" style="display: none;">Abrir Caja (Nuevo Turno)</button>
        </div>
    </div>

    <div id="panel-ventas" class="card mb-4 shadow-sm" style="display: none;">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">Registrar Movimiento</h5>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label class="fw-bold">Tipo de movimiento:</label>
                <select id="tipo" class="form-select form-select-lg" onchange="ajustarCampos()">
                    <option value="VENTA">Venta Normal</option>
                    <option value="RETIRO">Retiro de Dinero</option>
                    <option value="FONDO_CAJA">Fondo de Caja (Inicio)</option>
                </select>
            </div>

            <div class="mb-3" id="div-producto">
                <label id="label-producto" class="fw-bold">Producto:</label>
                <input type="text" id="producto" class="form-control form-control-lg" list="lista-productos" oninput="manejarInputProducto()" autocomplete="off" placeholder="Ej. Sabritas, Coca-Cola...">
                <datalist id="lista-productos"></datalist>
            </div>

            <div class="row">
                <div class="col-6 mb-3" id="div-cantidad">
                    <label class="fw-bold">Cantidad:</label>
                    <input type="number" id="cantidad" class="form-control form-control-lg" value="1">
                </div>

                <div class="col-6 mb-3" id="div-precio">
                    <label id="label-monto" class="fw-bold">Monto ($):</label>
                    <div class="input-group">
                        <input type="number" id="precio" class="form-control form-control-lg" placeholder="0.00">
                        <button class="btn btn-warning fw-bold" type="button" id="btn-actualizar-precio" onclick="actualizarPrecioMaestro()" title="Guardar como nuevo precio fijo">🔄</button>
                    </div>
                </div>
            </div>
            <button class="btn btn-success w-100 btn-lg shadow" onclick="registrar()">Guardar Registro</button>
        </div>
    </div>

    <div id="panel-lista" class="card mb-4 shadow-sm" style="display: none;">
        <div class="card-header bg-dark text-white text-center p-2">
            <h6 class="mb-0 text-white">Movimientos del Turno</h6>
        </div>
        <div class="card-body p-0 tabla-scroll">
            <table class="table table-striped mb-0 texto-lista">
                <thead class="table-light">
                    <tr>
                        <th class="text-center">Hora</th>
                        <th class="text-center">Cant</th>
                        <th>Producto</th>
                        <th class="text-center">Total</th>
                        <th class="text-center"></th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo"></tbody>
            </table>
        </div>
    </div>

    <div id="panel-corte" class="card shadow-sm border-danger mb-3" style="display: none;">
        <div class="card-body text-center">
            <button class="btn btn-danger btn-lg w-100" onclick="hacerCorte()">Hacer Corte de Caja</button>
        </div>
    </div>

    <div id="resultado-corte"></div>
</div>

<script>
    let idTurnoActual = null;
    let productosMemoria = [];
    let intervaloActualizacion = null;

    // IDs conocidos en la tabla para evitar reconstruir filas que no cambiaron
    let idsEnTabla = new Set();

    const API_URL = "https://sistema-caja-rapida.onrender.com";

    // ─── Aviso de error visible ───────────────────────────────────────────────
    let timeoutError = null;
    function mostrarError(msg) {
        const el = document.getElementById("aviso-error");
        el.textContent = msg || "⚠️ Sin conexión — reintentando...";
        el.style.display = "block";
        clearTimeout(timeoutError);
        timeoutError = setTimeout(() => { el.style.display = "none"; }, 4000);
    }

    // ─── Fecha ────────────────────────────────────────────────────────────────
    function mostrarFechaDelDia() {
        const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById("fecha-actual").innerText =
            new Date().toLocaleDateString('es-MX', opciones);
    }

    // ─── Historial ────────────────────────────────────────────────────────────
    async function abrirHistorial() {
        document.getElementById("panel-historial").style.display = "block";
        document.getElementById("detalle-historial").innerHTML = "";
        document.getElementById("lista-historial").innerHTML = "<p class='text-center mt-3'>Cargando...</p>";

        try {
            const res = await fetch(`${API_URL}/historial_turnos`);
            const turnos = await res.json();
            let html = "";
            if (turnos.length === 0) {
                html = "<p class='text-center text-muted mt-3'>No hay cortes registrados aún.</p>";
            } else {
                turnos.forEach(t => {
                    const fechaTxt = t.fecha_apertura
                        ? new Date(t.fecha_apertura).toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' })
                        : "Fecha Desconocida";
                    html += `
                    <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" onclick="verDetalleHistorial(${t.id_turno})">
                        <strong>Turno #${t.id_turno}</strong>
                        <span class="badge bg-secondary rounded-pill">${fechaTxt}</span>
                    </button>`;
                });
            }
            document.getElementById("lista-historial").innerHTML = html;
        } catch (e) {
            document.getElementById("lista-historial").innerHTML = "<p class='text-danger mt-3'>Error al cargar historial.</p>";
        }
    }

    function cerrarHistorial() {
        document.getElementById("panel-historial").style.display = "none";
    }

    async function verDetalleHistorial(idTurno) {
        document.getElementById("detalle-historial").innerHTML = "<p class='text-center mt-3'>Cargando ticket...</p>";
        try {
            const res = await fetch(`${API_URL}/resumen_turno/${idTurno}`);
            const datos = await res.json();
            document.getElementById("detalle-historial").innerHTML = construirTicketHTML(datos, idTurno);
        } catch (e) {
            document.getElementById("detalle-historial").innerHTML = "<p class='text-danger'>Error al cargar el resumen.</p>";
        }
    }

    // ─── Ticket (reutilizable) ────────────────────────────────────────────────
    function construirTicketHTML(datos, idTurno, momentoCierre = null) {
        let diaOperativo = "Día desconocido";
        if (datos.fecha_apertura) {
            const f = new Date(datos.fecha_apertura);
            if (!isNaN(f.getTime()))
                diaOperativo = f.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        const subtitulo = momentoCierre
            ? `Cierre realizado: ${momentoCierre}`
            : `Día operativo: ${diaOperativo}`;

        const encabezado = idTurno
            ? `Turno #${idTurno} — ${diaOperativo}`
            : `Turno del ${diaOperativo}`;

        return `
            <div class="card bg-light p-3 border-dark text-start shadow-sm mt-3">
                <div class="text-center mb-3 border-bottom pb-2">
                    <h6 class="mb-0 text-uppercase fw-bold text-primary">${encabezado}</h6>
                    <small class="text-muted">${subtitulo}</small>
                </div>
                <p class="h5">Venta Total: <strong>$${datos.total_en_caja.toFixed(2)}</strong></p>
                <p class="text-muted mb-1 mt-3">Cigarros y Time</p>
                <p class="h5">Total: <strong>$${datos.total_cigarros_time.toFixed(2)}</strong></p>
                <p class="text-muted mb-1 mt-2">Helados</p>
                <p class="h5">Total: <strong>$${(datos.total_helados || 0).toFixed(2)}</strong></p>
                <hr>
                <p class="h4">Efectivo Total: <span class="text-success">$${datos.total_neto.toFixed(2)}</span></p>
                <small class="text-muted">(Descontando Cigarros, Time y Helados)</small>
            </div>`;
    }

    // ─── Estado inicial ───────────────────────────────────────────────────────
    async function verificarEstadoInicial() {
        try {
            const res = await fetch(`${API_URL}/turno_actual`);
            const datos = await res.json();
            if (datos.estado === "ABIERTO") {
                idTurnoActual = datos.id_turno;
                configurarInterfazAbierta();
            } else {
                document.getElementById("panel-apertura").style.display = "block";
                document.getElementById("btn-abrir").style.display = "inline-block";
                document.getElementById("texto-turno").innerText = "No hay turno abierto";
                document.getElementById("texto-turno").className = "text-muted";
            }
        } catch (e) {
            mostrarError("⚠️ No se pudo conectar al servidor.");
            document.getElementById("btn-abrir").style.display = "inline-block";
        }
    }

    function configurarInterfazAbierta() {
        document.getElementById("panel-apertura").style.display = "none";
        document.getElementById("panel-ventas").style.display = "block";
        document.getElementById("panel-lista").style.display = "block";
        document.getElementById("panel-corte").style.display = "block";
        document.getElementById("btn-abrir").style.display = "none";
        document.getElementById("resultado-corte").innerHTML = "";

        actualizarLista();

        // Limpia cualquier intervalo anterior antes de crear uno nuevo
        // Esto evita que se acumulen múltiples setInterval corriendo al mismo tiempo
        if (intervaloActualizacion) clearInterval(intervaloActualizacion);
        intervaloActualizacion = setInterval(sincronizarTodo, 3000);
    }

    // ─── Sincronización ───────────────────────────────────────────────────────
    async function sincronizarTodo() {
        if (!idTurnoActual) return;
        try {
            const res = await fetch(`${API_URL}/turno_actual`);
            const datos = await res.json();

            if (datos.estado !== "ABIERTO") {
                try {
                    const resResumen = await fetch(`${API_URL}/resumen_turno/${idTurnoActual}`);
                    const datosResumen = await resResumen.json();
                    mostrarTicket(datosResumen);
                } catch (_) {}

                alert("El turno ha sido cerrado desde otro dispositivo.");
                resetearInterfazCerrada();
                return;
            }
            actualizarLista();
        } catch (e) {
            mostrarError();
        }
    }

    function resetearInterfazCerrada() {
        if (intervaloActualizacion) clearInterval(intervaloActualizacion);
        intervaloActualizacion = null;
        idTurnoActual = null;
        idsEnTabla.clear();
        document.getElementById("panel-apertura").style.display = "block";
        document.getElementById("btn-abrir").style.display = "inline-block";
        document.getElementById("btn-abrir").innerText = "Abrir Caja (Nuevo Turno)";
        document.getElementById("panel-ventas").style.display = "none";
        document.getElementById("panel-lista").style.display = "none";
        document.getElementById("panel-corte").style.display = "none";
        document.getElementById("texto-turno").innerText = "No hay turno abierto";
        document.getElementById("texto-turno").className = "text-muted";
    }

    // ─── Tabla de movimientos (sin parpadeo) ──────────────────────────────────
    async function actualizarLista() {
        if (!idTurnoActual) return;
        try {
            const res = await fetch(`${API_URL}/movimientos_turno/${idTurnoActual}`);
            const movimientos = await res.json();
            const cuerpo = document.getElementById("tabla-cuerpo");

            // Solo reconstruye si cambió algo (IDs distintos al set anterior)
            const nuevosIds = new Set(movimientos.map(m => m.id_movimiento));
            const cambio = nuevosIds.size !== idsEnTabla.size ||
                [...nuevosIds].some(id => !idsEnTabla.has(id));

            if (!cambio) return; // nada nuevo, no toques el DOM
            idsEnTabla = nuevosIds;

            cuerpo.innerHTML = movimientos.map(m => {
                const color = m.tipo_movimiento === 'RETIRO' ? 'text-danger fw-bold' : '';
                return `
                <tr class="${color}">
                    <td class="text-center">${m.hora || '--:--'}</td>
                    <td class="text-center">${m.cantidad}</td>
                    <td>${m.producto}</td>
                    <td class="text-center">$${m.total_movimiento.toFixed(2)}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="borrarMovimiento(${m.id_movimiento})">❌</button>
                    </td>
                </tr>`;
            }).join("");
        } catch (e) {
            mostrarError();
        }
    }

    // ─── Productos ────────────────────────────────────────────────────────────
    async function manejarInputProducto() {
        if (document.getElementById("tipo").value !== "VENTA") return;
        const texto = document.getElementById("producto").value;
        const divCantidad = document.getElementById("div-cantidad");

        if (!texto) {
            divCantidad.style.visibility = "visible";
            return;
        }

        const textoMin = texto.toLowerCase();
        const palabrasGranel = ['beriscan', 'gatina', 'jamon', 'jamón', 'hebra', 'añejo', 'granel'];
        const esGranel = palabrasGranel.some(p => textoMin.includes(p));

        divCantidad.style.visibility = esGranel ? "hidden" : "visible";
        if (esGranel) document.getElementById("cantidad").value = "1";

        try {
            const res = await fetch(`${API_URL}/buscar_productos?q=${encodeURIComponent(texto)}`);
            productosMemoria = await res.json();
            const datalist = document.getElementById("lista-productos");
            datalist.innerHTML = "";
            productosMemoria.forEach(p => {
                const opcion = document.createElement("option");
                opcion.value = p.nombre_producto;
                datalist.appendChild(opcion);
            });
            const coincidencia = productosMemoria.find(p => p.nombre_producto === texto);
            if (coincidencia && !esGranel) {
                document.getElementById("precio").value = coincidencia.precio_sugerido;
            }
        } catch (e) {
            mostrarError("No se pudo buscar productos.");
        }
    }

    function ajustarCampos() {
        const tipo = document.getElementById("tipo").value;
        const divProducto = document.getElementById("div-producto");
        const divCantidad = document.getElementById("div-cantidad");
        const labelMonto = document.getElementById("label-monto");
        const labelProducto = document.getElementById("label-producto");
        const btnActualizarPrecio = document.getElementById("btn-actualizar-precio");
        const inputProducto = document.getElementById("producto");

        document.getElementById("producto").value = "";
        document.getElementById("precio").value = "";

        if (tipo === "VENTA") {
            divProducto.style.display = "block";
            divCantidad.style.visibility = "visible";
            labelProducto.innerText = "Producto:";
            labelMonto.innerText = "Precio Unitario ($):";
            inputProducto.placeholder = "Ej. Sabritas, Coca-Cola...";
            btnActualizarPrecio.style.display = "block";
        } else if (tipo === "RETIRO") {
            divProducto.style.display = "block";
            divCantidad.style.visibility = "hidden";
            labelProducto.innerText = "Concepto de retiro:";
            inputProducto.placeholder = "Ej. Pago a proveedores, pasajes...";
            labelMonto.innerText = "Monto ($):";
            btnActualizarPrecio.style.display = "none";
        } else if (tipo === "FONDO_CAJA") {
            divProducto.style.display = "none";
            divCantidad.style.visibility = "hidden";
            labelMonto.innerText = "Monto inicial ($):";
            btnActualizarPrecio.style.display = "none";
            document.getElementById("producto").value = "Fondo inicial";
        }
    }

    async function actualizarPrecioMaestro() {
        const nombreProducto = document.getElementById("producto").value.trim();
        const nuevoPrecio = parseFloat(document.getElementById("precio").value);

        if (!nombreProducto || isNaN(nuevoPrecio) || nuevoPrecio < 0) {
            alert("⚠️ Selecciona un producto y escribe el nuevo precio antes de presionar el botón amarillo.");
            return;
        }
        if (!confirm(`¿Actualizar el precio de "${nombreProducto}" a $${nuevoPrecio}?`)) return;

        try {
            const res = await fetch(`${API_URL}/actualizar_precio`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nombre_producto: nombreProducto, nuevo_precio: nuevoPrecio })
            });
            const data = await res.json();
            alert(data.mensaje);
        } catch (e) {
            mostrarError("Error al actualizar el precio.");
        }
    }

    // ─── Acciones ─────────────────────────────────────────────────────────────
    async function abrirTurno() {
        try {
            const res = await fetch(`${API_URL}/abrir_turno`, { method: "POST" });
            const datos = await res.json();
            idTurnoActual = datos.id_turno;
            configurarInterfazAbierta();
        } catch (e) {
            mostrarError("Error al conectar con el servidor.");
        }
    }

    async function registrar() {
        const tipo = document.getElementById("tipo").value;
        const montoVal = parseFloat(document.getElementById("precio").value);
        let cantidadVal = parseFloat(document.getElementById("cantidad").value);
        let nombreProducto = document.getElementById("producto").value.trim();

        if (isNaN(montoVal) || montoVal < 0) { alert("Por favor ingresa un monto válido."); return; }
        if (tipo === "VENTA" && (isNaN(cantidadVal) || cantidadVal <= 0)) { alert("¡Error! La cantidad debe ser mayor a 0."); return; }
        if (tipo === "VENTA" && !nombreProducto) { alert("¡Cuidado! Olvidaste escribir el nombre del producto."); return; }
        if (tipo === "RETIRO" && !nombreProducto) { alert("Favor de poner el concepto o motivo del retiro."); return; }

        if (tipo === "FONDO_CAJA") nombreProducto = "Fondo inicial";
        if (tipo !== "VENTA") cantidadVal = 1;

        try {
            const res = await fetch(`${API_URL}/registrar_movimiento`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    id_turno: idTurnoActual,
                    tipo_movimiento: tipo,
                    producto: nombreProducto,
                    cantidad: cantidadVal,
                    precio_unitario: montoVal
                })
            });
            if (res.ok) {
                document.getElementById("producto").value = "";
                document.getElementById("precio").value = "";
                document.getElementById("cantidad").value = "1";
                ajustarCampos();
                actualizarLista();
            } else {
                mostrarError("El servidor rechazó el registro.");
            }
        } catch (e) {
            mostrarError("Error al guardar. Verifica tu conexión.");
        }
    }

    async function borrarMovimiento(idMovimiento) {
        if (!confirm("⚠️ ¿Estás seguro de cancelar este registro?\nEsta acción no se puede deshacer.")) return;
        try {
            const res = await fetch(`${API_URL}/borrar_movimiento/${idMovimiento}`, { method: "DELETE" });
            if (res.ok) {
                actualizarLista();
            } else {
                mostrarError("Error al cancelar el movimiento.");
            }
        } catch (e) {
            mostrarError("Error de conexión al cancelar.");
        }
    }

    function mostrarTicket(datos) {
        const cierre = new Date().toLocaleString('es-MX', {
            hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit'
        });
        document.getElementById("resultado-corte").innerHTML =
            construirTicketHTML(datos, null, cierre);
    }

    // ─── Corte de caja (ahora POST) ───────────────────────────────────────────
    async function hacerCorte() {
        if (!idTurnoActual) return;
        if (!confirm("⚠️ ¿Estás seguro de que deseas CERRAR LA CAJA y hacer el corte?\n\nYa no podrás agregar más ventas a este turno.")) return;

        try {
            // POST en lugar de GET — el corte es una acción, no una consulta
            const res = await fetch(`${API_URL}/corte_caja/${idTurnoActual}`, { method: "POST" });
            const datos = await res.json();
            mostrarTicket(datos);
            alert("Turno Cerrado Correctamente");
            resetearInterfazCerrada();
        } catch (e) {
            mostrarError("Error al cerrar la caja.");
        }
    }

    // ─── Init ─────────────────────────────────────────────────────────────────
    window.onload = function () {
        mostrarFechaDelDia();
        verificarEstadoInicial();
    };
</script>
</body>
</html>
